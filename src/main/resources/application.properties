# Configuração da URL do banco H2, usuário e senha
spring.datasource.url=jdbc:h2:mem:usuariodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Permite que o Spring crie as tabelas automaticamente com base na sua entidade @Usuario
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Habilita o console do H2 no navegador
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8081